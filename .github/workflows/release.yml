name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  vendor:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: libtailscale/go.sum

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: ${{ runner.os }}-${{ matrix.goarch }}-cargo-bindgen-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.goarch }}-cargo-bindgen-

      - name: build vendored archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
        run: |
          mkdir -p vendored/${{ matrix.goos }}-${{ matrix.goarch }}
          cd libtailscale
          go build -buildmode=c-archive -o ../vendored/${{ matrix.goos }}-${{ matrix.goarch }}/libtailscale.a .

      - name: install bindgen-cli
        run: which bindgen || cargo install bindgen-cli

      - name: generate bindings
        run: bindgen libtailscale/tailscale.h > vendored/${{ matrix.goos }}-${{ matrix.goarch }}/libtailscale.rs

      - uses: actions/upload-artifact@v4
        with:
          name: vendored-${{ matrix.goos }}-${{ matrix.goarch }}
          path: vendored/${{ matrix.goos }}-${{ matrix.goarch }}/

  test:
    needs: vendor
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      - uses: actions/download-artifact@v4
        with:
          name: vendored-${{ matrix.goos }}-${{ matrix.goarch }}
          path: vendored/${{ matrix.goos }}-${{ matrix.goarch }}/

      - name: cargo test
        run: cargo test --all-features

      - name: cargo clippy
        run: cargo clippy --all-features -- -D warnings

  # create github release FIRST so download URLs exist for cargo publish
  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: vendored-linux-amd64
          path: vendored/linux-amd64/

      - uses: actions/download-artifact@v4
        with:
          name: vendored-linux-arm64
          path: vendored/linux-arm64/

      - uses: actions/download-artifact@v4
        with:
          name: vendored-darwin-arm64
          path: vendored/darwin-arm64/

      - uses: actions/download-artifact@v4
        with:
          name: vendored-darwin-amd64
          path: vendored/darwin-amd64/

      - name: rename assets with unique filenames
        run: |
          for p in linux-amd64 linux-arm64 darwin-arm64 darwin-amd64; do
            cp "vendored/$p/libtailscale.a" "vendored/libtailscale-$p.a"
          done

      - name: create github release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            vendored/libtailscale-linux-amd64.a \
            vendored/libtailscale-linux-arm64.a \
            vendored/libtailscale-darwin-arm64.a \
            vendored/libtailscale-darwin-amd64.a

  # publish to crates.io AFTER release exists (build.rs downloads .a from release)
  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ubuntu-cargo-publish-${{ hashFiles('Cargo.lock') }}
          restore-keys: ubuntu-cargo-publish-

      - name: publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
